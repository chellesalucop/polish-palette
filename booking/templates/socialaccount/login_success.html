{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Successful - Polish Palette</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- Your Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/clientLoginSignup.css' %}">
</head>

<body>

<div class="container-fluid p-0">
    <div class="row full-height-row g-0">

        <!-- LEFT (Image now) -->
        <div class="col-md-8 d-none d-md-block auth-right">
            <img src="{% static 'images/login.jpg' %}"
                 alt="Login Image"
                 class="signup-image">
        </div>

        <!-- RIGHT (Form now) -->
        <div class="col-md-4 d-flex align-items-center justify-content-center auth-left">
            <div class="w-75 text-center">
                
                <!-- Success Icon -->
                <div class="mb-4">
                    <div class="success-icon">
                        <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                    </div>
                </div>

                <h3 class="fw-bold mb-2 title-text">Welcome Back!</h3>
                <p class="subtitle-text mb-4">You have successfully logged in with your Google account.</p>

                <div class="alert alert-success">
                    <i class="bi bi-shield-check me-2"></i>
                    Authentication successful
                </div>

                <a href="{% url 'dashboard' %}" class="btn w-100 primary-btn mb-3">
                    <i class="bi bi-speedometer2 me-2"></i>
                    Go to Dashboard
                </a>

                <div class="mt-4">
                    <small class="text-muted">
                        <i class="bi bi-google me-1"></i>
                        Connected with Google account
                    </small>
                </div>

            </div>
        </div>

    </div>
</div>

</body>
</html>
