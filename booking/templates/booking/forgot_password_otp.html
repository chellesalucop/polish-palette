{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - OTP Verification</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- Your Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/clientLoginSignup.css' %}">
</head>

<body>

<div class="container-fluid p-0">
    <div class="row full-height-row g-0">

        <!-- LEFT (Image now) -->
        <div class="col-md-8 d-none d-md-block auth-right">
            <img src="{% static 'images/login.jpg' %}"
                 alt="OTP Verification Image"
                 class="signup-image">
        </div>

        <!-- RIGHT (Form now) -->
        <div class="col-md-4 d-flex align-items-center justify-content-center auth-left">
            <div class="w-75">

                <h3 class="fw-bold mb-2 title-text">Enter OTP</h3>
                <p class="subtitle-text mb-4">Check your email for the 6-digit code</p>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}

                    <!-- OTP -->
                    <div class="mb-3">
                        <label class="form-label">6-Digit OTP Code</label>
                        <div class="d-flex justify-content-center gap-2 mb-3">
                            <input type="text" id="otp-input" name="otp" maxlength="6" 
                                   class="form-control custom-input text-center" 
                                   placeholder="000000" required
                                   style="max-width: 200px; font-size: 1.5rem; letter-spacing: 0.5rem;">
                        </div>
                        <div id="otpTimerContainer" class="text-center mb-2">
                            <small class="text-muted">Code expires in: </small>
                            <small id="otpCountdown" class="fw-bold text-danger">2:00</small>
                        </div>
                        <div class="text-center mb-3">
                            <button type="button" class="btn btn-link account-link p-0 small" id="resendBtn" onclick="handleResend()">
                                Resend Code
                            </button>
                            <div id="countdownText" class="text-muted small mt-1" style="display:none;">
                                Resend available in <span id="timer">60</span>s
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn w-100 primary-btn mb-3">
                        <i class="bi bi-shield-check me-2"></i>Verify OTP
                    </button>

                    <div class="text-center">
                        <a href="{% url 'forgot_password_email' %}" class="account-link">
                            <i class="bi bi-arrow-left me-1"></i>Back to Email
                        </a>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>

<script>
// Auto-focus and format OTP input
document.addEventListener('DOMContentLoaded', function() {
    const otpInput = document.getElementById('otp-input');
    const otpCountdown = document.getElementById('otpCountdown');
    const resendContainer = document.getElementById('resendContainer');
    const verifyBtn = document.querySelector('.primary-btn');

    if (otpInput) {
        otpInput.focus();
        otpInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
            if (this.value.length === 6) {
                this.form.submit();
            }
        });
    }

    // OTP Expiration Countdown
    let timeRemaining = parseInt("{{ remaining_seconds|default:120 }}");
    
    function updateTimer() {
        const minutes = Math.floor(timeRemaining / 60);
        const seconds = timeRemaining % 60;
        otpCountdown.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        
        if (timeRemaining <= 0) {
            clearInterval(timerInterval);
            otpCountdown.textContent = "Expired";
            otpInput.disabled = true;
            verifyBtn.disabled = true;
        }
        timeRemaining--;
    }

    updateTimer();
    const timerInterval = setInterval(updateTimer, 1000);
});

function handleResend() {
    const btn = document.getElementById('resendBtn');
    const text = document.getElementById('countdownText');
    const span = document.getElementById('timer');
    
    btn.style.display = 'none';
    text.style.display = 'block';
    
    let count = 60;
    const interval = setInterval(() => {
        count--;
        span.textContent = count;
        if (count <= 0) {
            clearInterval(interval);
            btn.style.display = 'inline-block';
            text.style.display = 'none';
        }
    }, 1000);

    // Fetch call to resend OTP for forgot password
    fetch("{% url 'forgot_password_email' %}", {
        method: 'POST',
        headers: {
            'X-CSRFToken': '{{ csrf_token }}',
            'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: new URLSearchParams({
            'email': '{{ request.session.reset_email }}',
            'csrfmiddlewaretoken': '{{ csrf_token }}'
        })
    }).then(() => {
        window.location.reload();
    });
}
</script>

<script src="{% static 'js/script.js' %}"></script>

</body>
</html>
