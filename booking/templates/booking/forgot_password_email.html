{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Email</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- Your Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/clientLoginSignup.css' %}">
</head>

<body>

<div class="container-fluid p-0">
    <div class="row full-height-row g-0">

        <!-- LEFT (Image now) -->
        <div class="col-md-8 d-none d-md-block auth-right">
            <img src="{% static 'images/login.jpg' %}"
                 alt="Forgot Password Image"
                 class="signup-image">
        </div>

        <!-- RIGHT (Form now) -->
        <div class="col-md-4 d-flex align-items-center justify-content-center auth-left">
            <div class="w-75">

                <h3 class="fw-bold mb-2 title-text">Forgot Password?</h3>
                <p class="subtitle-text mb-4">Enter your email address to receive an OTP</p>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email"
                               name="email"
                               class="form-control custom-input"
                               placeholder="@gmail.com"
                               required>
                    </div>

                    <button type="submit" class="btn w-100 primary-btn mb-3">
                        <i class="bi bi-envelope me-2"></i>Send OTP
                    </button>

                    <p class="text-center mt-3 account-text">
                        Remember your password?
                        <a href="{% url 'login' %}" class="account-link">Log In</a>
                    </p>

                </form>

            </div>
        </div>
    </div>
</div>

<script src="{% static 'js/script.js' %}"></script>

</body>
</html>
