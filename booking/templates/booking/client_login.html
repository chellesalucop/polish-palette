{% load socialaccount %}
{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Your Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/clientLoginSignup.css' %}">
</head>

<body>

    <div class="container-fluid p-0">
        <div class="row full-height-row g-0">

            <!-- LEFT (Image now) -->
            <div class="col-md-8 d-none d-md-block auth-right">
                <img src="{% static 'images/login.jpg' %}" alt="Login Image" class="signup-image">
            </div>

            <!-- RIGHT (Form now) -->
            <div class="col-md-4 d-flex align-items-center justify-content-center auth-left">
                <div class="w-75">

                    <h3 class="fw-bold mb-2 title-text">Welcome Back</h3>
                    <p class="subtitle-text mb-4">Login to continue to your account</p>

                    {% if messages %}
                    {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endfor %}
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label">Email address</label>
                            <input type="email" name="email" class="form-control custom-input" placeholder="@gmail.com"
                                required>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <div class="d-flex justify-content-between">
                                <label class="form-label mb-1">Password</label>
                                <a href="{% url 'forgot_password_email' %}" class="forgot-link small">
                                    Forgot password?
                                </a>
                            </div>
                            <div class="position-relative">
                                <input type="password" name="password" class="form-control custom-input pe-5"
                                    placeholder="********" required>

                            </div>
                        </div>

                        <button type="submit" class="btn w-100 primary-btn mb-3">
                            Log In
                        </button>

                        <!-- Divider -->
                        <div class="divider mb-4">
                            <span>OR</span>
                        </div>

                        <!-- Google OAuth -->
                        <div class="mb-4">
                            <a href="{% provider_login_url 'google' process='login' %}"
                                class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center google-oauth-btn"
                                id="googleLoginBtn">
                                <svg width="18" height="18" viewBox="0 0 24 24" class="me-2 google-icon">
                                    <path fill="#4285F4"
                                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                                    <path fill="#34A853"
                                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                                    <path fill="#FBBC05"
                                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                                    <path fill="#EA4335"
                                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                                </svg>
                                <span class="google-btn-text">Sign in with Google</span>
                                <div class="spinner-border spinner-border-sm ms-2 google-spinner"
                                    style="display: none;"></div>
                            </a>
                        </div>

                        <p class="text-center mt-3 account-text">
                            Don’t have an account?
                            <a href="{% url 'signup' %}" class="account-link">Sign Up</a>
                        </p>

                        <p class="text-center mt-2">
                            <small class="text-muted">
                                Artist? <a href="{% url 'artist_login' %}" class="account-link">Login here</a>
                            </small>
                        </p>

                    </form>

                </div>
            </div>

        </div>
    </div>

    <script src="{% static 'js/script.js' %}"></script>
    <script src="{% static 'js/notifications.js' %}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const googleLoginBtn = document.getElementById('googleLoginBtn');

            if (googleLoginBtn) {
                googleLoginBtn.addEventListener('click', function (e) {
                    // Show loading state immediately
                    const btnText = this.querySelector('.google-btn-text');
                    const spinner = this.querySelector('.google-spinner');
                    const icon = this.querySelector('.google-icon');

                    btnText.textContent = 'Connecting to Google...';
                    spinner.style.display = 'inline-block';
                    icon.style.opacity = '0.6';
                    this.style.opacity = '0.8';
                    this.style.pointerEvents = 'none';

                    // Add subtle pulse animation
                    this.classList.add('pulse-animation');

                    // The actual navigation will happen via the href
                    setTimeout(() => {
                        // Add a brief delay to show the loading state
                    }, 100);
                });
            }
        });
    </script>

</body>

</html>
