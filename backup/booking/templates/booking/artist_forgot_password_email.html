{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist Forgot Password Email</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- Your Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/client_forgot.css' %}">
</head>

<body>

<div class="container-fluid p-0">
    <div class="row full-height-row g-0">

        <!-- LEFT (Image now) -->
        <div class="col-md-8 d-none d-md-block auth-right">
            <img src="{% static 'images/login.jpg' %}"
                 alt="Login Image"
                 class="signup-image">
        </div>

        <!-- RIGHT (Form now) -->
        <div class="col-md-4 d-flex align-items-center justify-content-center auth-left">
            <div class="w-75">

                <h3 class="fw-bold mb-2 title-text">Artist Password Reset</h3>
                <p class="subtitle-text mb-4">Enter your email to reset your artist password</p>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
           
                <form method="POST" action="{% url 'artist_forgot_password_email' %}">
                    {% csrf_token %}

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label">Email address</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-envelope"></i>
                            </span>
                            <input type="email" 
                                   class="form-control" 
                                   name="email" 
                                   placeholder="Enter your email"
                                   required>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn custom-primary-btn">
                            <i class="bi bi-send me-2"></i>Send Reset Code
                        </button>
                    </div>

                </form>

                <!-- Back to Login -->
                <div class="text-center mt-4">
                    <a href="{% url 'artist_login' %}" class="text-muted text-decoration-none">
                        <i class="bi bi-arrow-left me-1"></i>Back to Artist Login
                    </a>
                </div>

            </div>
        </div>

    </div>
</div>
</body>
</html>
