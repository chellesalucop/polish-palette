<style>
    .ai-bubble-container {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 9999;
        font-family: inherit;
    }
    .ai-bubble-button {
        width: 65px;
        height: 65px;
        background-color: #802D3D; /* Updated to Red-Violet */
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        cursor: pointer;
        box-shadow: 0 6px 16px rgba(128, 45, 61, 0.4); /* Updated shadow */
        transition: all 0.3s ease;
        border: none;
    }
    .ai-bubble-button:hover {
        transform: scale(1.08) translateY(-3px);
        background-color: #641e2b; /* Darker Red-Violet on hover */
    }
    .ai-popup-window {
        display: none;
        position: absolute;
        bottom: 85px;
        right: 0;
        width: 340px;
        background-color: #ffffff;
        border: 1px solid #eee;
        border-radius: 16px;
        box-shadow: 0 12px 28px rgba(0,0,0,0.15);
        overflow: hidden;
        opacity: 0;
        transition: opacity 0.3s ease;
    }
    .ai-popup-window.show {
        display: block;
        opacity: 1;
    }
    .ai-popup-header {
        background-color: #802D3D; /* Updated to Red-Violet */
        color: white;
        padding: 16px;
        text-align: center;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }
    .ai-popup-body {
        padding: 20px;
        max-height: 450px;
        overflow-y: auto;
    }
    .ai-input-group {
        margin-bottom: 20px;
    }
    .ai-input-group input {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #ccc;
        border-radius: 8px;
        margin-bottom: 12px;
        font-size: 0.9rem;
        transition: border-color 0.2s;
    }
    .ai-input-group input:focus {
        outline: none;
        border-color: #802D3D; /* Updated focus color */
        box-shadow: 0 0 0 3px rgba(128, 45, 61, 0.2);
    }
    .ai-ask-btn {
        width: 100%;
        padding: 12px;
        background-color: #802D3D; /* Updated to Red-Violet */
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: background-color 0.2s;
    }
    .ai-ask-btn:hover {
        background-color: #641e2b;
    }
    .ai-loading {
        text-align: center;
        color: #802D3D; /* Updated to Red-Violet */
        font-style: italic;
        margin-top: 20px;
        display: none;
    }
    .ai-design-item {
        background: white;
        margin-bottom: 15px;
        border-radius: 10px;
        border: 1px solid #eee;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        transition: transform 0.2s;
    }
    .ai-design-item:hover {
        transform: translateY(-2px);
    }
    .ai-design-item img {
        width: 100%;
        height: 160px;
        object-fit: cover;
    }
    .ai-design-content {
        padding: 12px;
        text-align: center;
    }
    .ai-design-content h4 {
        margin: 0 0 5px 0;
        color: #333;
        font-size: 1rem;
        font-weight: bold;
    }
    .ai-design-content small {
        color: #B7AA7A;
        font-size: 0.8rem;
        display: block;
        margin-bottom: 8px;
    }
</style>

<div class="ai-bubble-container">
    <div class="ai-popup-window" id="aiPopupWindow">
        <div class="ai-popup-header">
            <i class="bi bi-stars"></i> AI Style Matcher
        </div>
        <div class="ai-popup-body">
            <div class="ai-input-group">
                <p style="text-align: center; font-size: 0.9em; color: #555; margin-bottom: 15px;">
                    Not sure what to get? Tell me what you're looking for!
                </p>
                <input type="text" id="aiPromptInput" placeholder="e.g. Elegant pink for a wedding..." onkeypress="handleAIPress(event)">
                <button class="ai-ask-btn" onclick="fetchRecommendations()">Get Recommendations</button>
            </div>
            
            <div id="aiLoadingIndicator" class="ai-loading">
                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                Analyzing portfolio...
            </div>
            
            <div id="aiRecommendationsContainer"></div>
        </div>
    </div>
    
    <button class="ai-bubble-button" onclick="toggleAIPopup()" title="Ask our AI for design ideas!">
        ✨
    </button>
</div>

<script>
    function toggleAIPopup() {
        const popup = document.getElementById('aiPopupWindow');
        if (popup.classList.contains('show')) {
            popup.classList.remove('show');
            setTimeout(() => popup.style.display = 'none', 300);
        } else {
            popup.style.display = 'block';
            setTimeout(() => popup.classList.add('show'), 10);
        }
    }

    function handleAIPress(event) {
        if (event.key === 'Enter') {
            fetchRecommendations();
        }
    }

    function createDesignCard(design, params) {
        const item = document.createElement('div');
        item.className = 'ai-design-item';

        const image = document.createElement('img');
        image.src = design.image_url || '';
        image.alt = design.title || 'Recommended nail design';
        item.appendChild(image);

        const content = document.createElement('div');
        content.className = 'ai-design-content';

        const title = document.createElement('h4');
        title.textContent = design.title || 'Untitled design';
        content.appendChild(title);

        const tags = document.createElement('small');
        tags.textContent = design.tags || '';
        content.appendChild(tags);

        // ALWAYS show the button, building the URL from AI parameters
        let bookingUrl = '/booking/?';
        const queryParams = [];
        
        if (params && params.category) queryParams.push(`category=${encodeURIComponent(params.category)}`);
        if (params && params.complexity) queryParams.push(`complexity=${encodeURIComponent(params.complexity)}`);
        if (params && params.tip) queryParams.push(`tip=${encodeURIComponent(params.tip)}`);
        
        // Pass the design ID so the form knows which gallery image to auto-select!
        queryParams.push(`ref=${design.id}`);
        
        bookingUrl += queryParams.join('&');

        const button = document.createElement('a');
        button.href = bookingUrl;
        button.className = 'btn btn-sm w-100 fw-bold mt-2';
        button.style.backgroundColor = '#802D3D';
        button.style.color = 'white';
        // If it has an old price show it, otherwise say "Build This Custom Set"
        button.textContent = design.service_price && design.service_price !== "None" ? `Book This Look (₱${design.service_price})` : `Build This Custom Set`;
        content.appendChild(button);

        item.appendChild(content);
        return item;
    }

    async function fetchRecommendations() {
        const container = document.getElementById('aiRecommendationsContainer');
        const loading = document.getElementById('aiLoadingIndicator');
        const promptInput = document.getElementById('aiPromptInput').value;
        
        if (!promptInput.trim()) return;

        container.innerHTML = '';
        loading.style.display = 'block';
        
        try {
            const url = `/api/recommend-designs/?preference=${encodeURIComponent(promptInput)}`;
            const response = await fetch(url);
            const data = await response.json();
            
            loading.style.display = 'none';
            
            if (data.recommendations && data.recommendations.length > 0) {
                const heading = document.createElement('h6');
                heading.className = 'text-center mb-3 fw-bold';
                heading.style.color = '#802D3D';
                heading.textContent = 'Top Matches For You';
                container.appendChild(heading);

                data.recommendations.forEach(design => {
                    container.appendChild(createDesignCard(design, data.booking_params));
                });
            } else {
                container.innerHTML = '<p class="text-center text-muted mt-3">No matching designs found right now. Try a different style!</p>';
            }
        } catch (error) {
            console.error("Error fetching AI recommendations:", error);
            loading.style.display = 'none';
            container.innerHTML = '<p class="text-center text-danger mt-3">Oops! The AI is taking a quick break. Try again later.</p>';
        }
    }
</script>
