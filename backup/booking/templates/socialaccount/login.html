{% load static %}
{% load i18n %}
{% load socialaccount %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In Via Google - PolishPalette</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/client_login.css' %}">
    
    <style>
        body {
            background-color: var(--white-choco);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .simple-auth-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }
        .brand-logo {
            max-width: 150px;
            margin-bottom: 25px;
        }
        .title-text {
            color: var(--red-violet);
            font-weight: 700;
            margin-bottom: 10px;
        }
        .subtitle-text {
            color: #6E4F3A;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<div class="simple-auth-card">
    <!-- Brand Logo -->
    <img src="{% static 'images/logo.png' %}" alt="Polish Palette" class="brand-logo">

    <!-- Title Section -->
    <h3 class="title-text">Sign In Via Google</h3>
    <p class="subtitle-text">You are about to sign in using your Google account.</p>

    <!-- Action Section -->
    <div class="socialaccount_ballot">
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn w-100 primary-btn mb-3 p-3">
                Continue to PolishPalette
            </button>
        </form>
    </div>

    <!-- Back Link -->
    <a href="{% url 'login' %}" class="account-link small">
        Back to Login
    </a>
</div>

</body>
</html>
